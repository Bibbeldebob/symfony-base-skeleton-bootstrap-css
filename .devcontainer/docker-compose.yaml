version: "3.8"

services:
  app:
    build: .
    volumes:
      - ..:/workspace:cached
      - ./php.ini:/usr/local/etc/php/php.ini
      - ./php-xdebug.ini:/usr/local/etc/php/conf.d/zz-xdebug-php.ini
    depends_on:
      - db
    networks:
      - devnet

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - devnet

volumes:
  db-data:

networks:
  devnet:
